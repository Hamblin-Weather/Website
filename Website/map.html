<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Temps Map | Hamblin Weather Dashboard</title>

  <style>
    :root{
      --bg:#0B2341;
      --panel:rgba(255,255,255,0.06);
      --text:#ffffff;
      --muted:rgba(255,255,255,0.72);
      --accent:#FF8200;
      --line:rgba(255,255,255,0.12);
      --shadow:0 10px 30px rgba(0,0,0,0.30);
      --radius:16px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      zoom:0.96;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:rgba(0,0,0,0.08);
    }
    .leftBrand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .logo{
      width:44px;
      height:44px;
      object-fit:contain;
      display:block;
    }
    .brand{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      min-width:0;
    }
    .brand .title{
      font-size:20px;
      font-weight:800;
      letter-spacing:0.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand .subtitle{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }
    .nav{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .nav a{
      text-decoration:none;
      color:var(--text);
      font-weight:800;
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.06);
    }
    .nav a:hover{ background:rgba(255,255,255,0.10); }

    .wrap{ padding:14px 16px 18px; }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:14px;
      max-width:980px;
    }

    .big{
      font-size:18px;
      font-weight:900;
      margin:0 0 6px 0;
    }

    .muted{ color:var(--muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="leftBrand">
      <img class="logo" src="logo.png" alt="Hamblin Weather Dashboard logo" />
      <div class="brand">
        <div class="title">Hamblin Weather Dashboard</div>
        <div class="subtitle" id="clock">Loading time...</div>
      </div>
    </div>

    <div class="nav">
      <a href="index.html">Dashboard</a>
      <a href="map.html">Temps Map</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <p class="big">Temps Map</p>
      <p class="muted">
        This is Page 2. Next step is adding the county map and plotting temps here, without touching the dashboard page.
      </p>
      <p class="muted">
        When you confirm this page loads, I will drop in the full map code.
      </p>
    </div>
  </div>

  <script>
    function startClock(){
      const el = document.getElementById("clock");
      function tick(){
        const now = new Date();
        const opts = { weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" };
        el.textContent = now.toLocaleString(undefined, opts);
      }
      tick();
      setInterval(tick, 1000);
    }
    startClock();
  </script>
</body>
</html>
